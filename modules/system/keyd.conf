[ids]

*

[main]
# rebind copilot key > hyper layer
leftshift+leftmeta+f23 = layer(hyper)
# rebind capslock > control when held/ esc when pressed
capslock = overload(control, esc)
# rebind left alt/ left meta keys
leftmeta = layer(alt)
leftalt = layer(macos_meta)

# hyper layer: control+meta+shift+alt
[hyper:C-M-S-A]

# custom meta layer: https://github.com/rvaiya/keyd/blob/master/examples/macos.conf
[macos_meta:C]
# meta-space: open launcher
space = M-/
# switch tabs, etc
1 = A-1
2 = A-2
3 = A-3
4 = A-4
5 = A-5
6 = A-6
7 = A-7
8 = A-8
9 = A-9
# copy, paste, cut
c = C-insert
v = S-insert
x = S-delete
# move cursor to beginning/ end of line
left = home
right = end
