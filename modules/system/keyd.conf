[ids]

*

[main]

leftshift+leftmeta+f23 = layer(hyper) # copilot key
capslock = noop()
leftmeta = overload(meta_macos, leftmeta)
leftalt = leftalt


[meta_macos:C]

# open launcher
space = M-/

# switch tabs, etc
1 = A-1
2 = A-2
3 = A-3
4 = A-4
5 = A-5
6 = A-6
7 = A-7
8 = A-8
9 = A-9

# copy/ paste/ cut
c = C-insert
v = S-insert
x = S-delete

left = home
right = end

tab = swapm(app_switch_state, M-tab)
` = A-f6

[app_switch_state:M]

tab = M-tab
right = M-tab

` = M-S-tab
left = M-S-tab

[hyper:C-M-S-A]
